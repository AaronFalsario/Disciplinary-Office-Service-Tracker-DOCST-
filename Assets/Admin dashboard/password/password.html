<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DOCST - Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="/Assets/Images/DOCST LOGO.png">
    <link rel="stylesheet" href="/Assets/Admin dashboard/password/style.css">
</head>
<body>

<nav class="nav">
    <a href="/Assets/Student Authentication/Admin Authentication/Admin.html" class="logo">
        <img src="/Assets/Images/DOCST LOGO.png" alt="DOCST Logo">
        <span>DOCST</span>
    </a>
    <a href="/Assets/Student Authentication/Admin Authentication/Admin.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back to Login
    </a>
</nav>

<div class="container">
    <div class="card">
        <!-- Only Email Input -->
        <div id="resetForm">
            <div class="icon-wrapper"><i class="fas fa-lock"></i></div>
            <h2>Forgot Password?</h2>
            <p class="desc">Enter your registered admin email address and we'll send you a password reset link.</p>
            
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="resetEmail" placeholder="admin@gordoncollege.edu.ph">
                </div>
            </div>
            
            <button class="btn" id="sendResetLinkBtn">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toastNotification" class="toast-notification"></div>

<script type="module" src="/Assets/Admin dashboard/password/function.js"></script>
</body>
</html>
