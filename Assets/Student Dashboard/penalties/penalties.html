<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOCST — My Penalties</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="/Images/DOCST LOGO.png" type="image/png">
    <link rel="stylesheet" href="/Assets/Student Dashboard/penalties/pen.css">
</head>
<body>
    <!-- Navigation Drawer -->
    <div class="drawer-overlay" id="overlay"></div>
    <nav class="drawer" id="drawer">
        <div class="drawer-header">
            <button class="drawer-close" id="drawerClose">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <div class="drawer-profile">
                <div class="drawer-avatar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <div class="drawer-info">
                    <div class="drawer-name" id="studentName">Student Name</div>
                    <div class="drawer-role">Student</div>
                </div>
                <span class="drawer-badge" id="studentId">ID: ---</span>
            </div>
        </div>
        <div class="drawer-nav">
            <button class="drawer-item" onclick="window.location.href='/Assets/Student Dashboard/stud.html'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <rect x="3" y="3" width="7" height="7"/>
                    <rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/>
                    <rect x="3" y="14" width="7" height="7"/>
                </svg>
                Dashboard
            </button>
            <button class="drawer-item active" onclick="window.location.href='/Assets/Student Dashboard/penalties/penalties.html'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                My Penalties
            </button>
            <button class="drawer-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                </svg>
                Reports
            </button>
            <button class="drawer-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
                </svg>
                Settings
            </button>
            <hr class="drawer-divider">
            <button class="drawer-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                Notifications
            </button>
        </div>
        <div class="drawer-footer">
            <button class="drawer-logout" id="logoutBtn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Logout
            </button>
        </div>
    </nav>

    <!-- Header -->
    <header class="topbar">
        <div class="topbar-left">
            <button class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </button>
            <div class="brand">
                <div class="brand-logo">
                    <img src="/Images/DOCST LOGO.png" alt="DOCST Logo">
                </div>
                <span class="brand-name">DOCST</span>
            </div>
            <div class="student-pill">
                <i class="fas fa-graduation-cap"></i>
                <span>Student Portal</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="users-section">
        <div class="page-header">
            <h1 class="page-title">My Penalties</h1>
            <p class="page-sub">View your community service penalties and track your progress</p>
        </div>

        <!-- Statistics Cards -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-number" id="pendingPenalties">0</div>
                    <div class="stat-label">Pending Penalties</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-number" id="completedHours">0</div>
                    <div class="stat-label">Completed Hours</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-number" id="totalViolations">0</div>
                    <div class="stat-label">Total Violations</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-number" id="complianceRate">0%</div>
                    <div class="stat-label">Compliance Rate</div>
                </div>
            </div>
        </div>

        <!-- Penalties Table -->
        <div class="section-hdr">
            <h2 class="section-title">My Penalty Records</h2>
        </div>

        <div class="table-wrap">
            <table role="table" aria-label="Penalties table">
                <thead>
                    <tr>
                        <th>VIOLATION</th>
                        <th>SERVICE TYPE</th>
                        <th>HOURS</th>
                        <th>STATUS</th>
                        <th>DEADLINE</th>
                    </tr>
                </thead>
                <tbody id="penaltiesTableBody">
                </tbody>
            </table>
        </div>
    </main>
<script src="/Assets/Student Dashboard/penalties/pen.js"></script>
</body>
</html>
