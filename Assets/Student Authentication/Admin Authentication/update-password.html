<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DOCST - Update Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="/Assets/Images/DOCST LOGO.png">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue: #2563EB;
            --blue-dark: #1D4ED8;
            --blue-light: #EFF6FF;
            --text: #0F172A;
            --muted: #64748B;
            --border: #E2E8F0;
            --surface: #FFFFFF;
            --bg: #F1F5F9;
            --red: #DC2626;
            --red-light: #FEE2E2;
            --green: #10B981;
            --green-light: #D1FAE5;
            --yellow: #F59E0B;
            --yellow-light: #FEF3C7;
        }

        html, body {
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
        }

        /* Toast Notification */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            min-width: 280px;
            max-width: 400px;
            padding: 16px 20px;
            border-radius: 50px;
            background: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            transform: translateX(450px);
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
            font-size: 14px;
            font-weight: 500;
            pointer-events: none;
        }

        .toast-notification.show {
            transform: translateX(0);
            pointer-events: all;
        }

        .toast-notification.success { background: var(--green); color: white; }
        .toast-notification.error   { background: var(--red);   color: white; }
        .toast-notification.info    { background: var(--blue);  color: white; }

        .toast-notification i { font-size: 18px; flex-shrink: 0; }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }

        .logo span {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--blue-light);
            color: var(--blue);
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-btn:hover { background: var(--blue); color: white; }

        /* Container */
        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 24px 48px;
        }

        .card {
            background: var(--surface);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            background: var(--blue-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .icon-wrapper i { font-size: 28px; color: var(--blue); }

        h2 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            margin-bottom: 12px;
        }

        .desc {
            font-size: 14px;
            color: var(--muted);
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* Form */
        .form-group { margin-bottom: 24px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 0 16px;
            transition: all 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--blue);
            background: white;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .input-group i { color: var(--muted); font-size: 15px; width: 22px; }

        .input-group input {
            flex: 1;
            padding: 14px 10px;
            border: none;
            background: none;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }

        .input-group .eye-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            padding: 8px;
        }

        /* Password Strength */
        .strength-bar {
            height: 4px;
            border-radius: 4px;
            background: var(--border);
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .strength-label {
            font-size: 11px;
            margin-top: 6px;
            font-weight: 500;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover:not(:disabled) { background: var(--blue-dark); transform: translateY(-1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Error message */
        .error-message {
            margin-top: 8px;
            font-size: 12px;
            color: var(--red);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        @media (max-width: 550px) {
            .card { padding: 28px 20px; }
            h2 { font-size: 20px; }
            .nav { padding: 12px 16px; }
            .logo span { font-size: 15px; }
            .logo img { width: 32px; height: 32px; }
            .toast-notification { bottom: 20px; right: 16px; left: 16px; max-width: calc(100% - 32px); }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="/Assets/Student Authentication/Admin Authentication/Admin.html" class="logo">
        <img src="/Assets/Images/DOCST LOGO.png" alt="DOCST Logo">
        <span>DOCST</span>
    </a>
    <a href="/Assets/Student Authentication/Admin Authentication/Admin.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back to Login
    </a>
</nav>

<div class="container">
    <div class="card">
        <div class="icon-wrapper">
            <i class="fas fa-key"></i>
        </div>
        <h2>Create New Password</h2>
        <p class="desc">Enter your new password below</p>
        
        <div class="form-group">
            <label>New Password</label>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="newPassword" placeholder="Enter new password (min. 6 characters)">
                <button class="eye-btn" type="button" onclick="togglePassword('newPassword', this)">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>
            <div class="strength-label" id="strengthLabel">Password strength: None</div>
        </div>
        
        <div class="form-group">
            <label>Confirm New Password</label>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm your new password">
                <button class="eye-btn" type="button" onclick="togglePassword('confirmPassword', this)">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        
        <button class="btn" id="updatePasswordBtn">
            <i class="fas fa-check-circle"></i> Update Password
        </button>
    </div>
</div>

<div id="toastNotification" class="toast-notification"></div>

<script type="module">
    import { createClient } from '@supabase/supabase-js'
    
    const supabaseUrl = import.meta.env.VITE_SUPABASE_URL
    const supabaseKey = import.meta.env.VITE_SUPABASE_ANON_KEY
    const supabase = createClient(supabaseUrl, supabaseKey)
    
    // DOM Elements
    const newPassword = document.getElementById('newPassword')
    const confirmPassword = document.getElementById('confirmPassword')
    const updateBtn = document.getElementById('updatePasswordBtn')
    const toastNotification = document.getElementById('toastNotification')
    const strengthFill = document.getElementById('strengthFill')
    const strengthLabel = document.getElementById('strengthLabel')
    
    // Toast function
    function showToast(message, type = 'success') {
        const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' }
        toastNotification.className = `toast-notification ${type}`
        toastNotification.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i><span>${message}</span>`
        toastNotification.classList.add('show')
        setTimeout(() => toastNotification.classList.remove('show'), 5000)
    }
    
    // Show error inline
    function showError(inputElement, message) {
        const parent = inputElement.closest('.form-group')
        const oldError = parent.querySelector('.error-message')
        if (oldError) oldError.remove()
        
        const error = document.createElement('div')
        error.className = 'error-message'
        error.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`
        parent.appendChild(error)
        
        setTimeout(() => {
            if (error.parentElement) error.remove()
        }, 5000)
    }
    
    function clearErrors() {
        document.querySelectorAll('.error-message').forEach(el => el.remove())
    }
    
    // Password strength checker
    function checkPasswordStrength(password) {
        let strength = 0
        let strengthText = ''
        let color = ''
        
        if (password.length === 0) {
            strengthFill.style.width = '0%'
            strengthLabel.innerHTML = 'Password strength: None'
            strengthLabel.style.color = ''
            return
        }
        
        if (password.length >= 6) strength += 1
        if (password.length >= 8) strength += 1
        if (/[A-Z]/.test(password)) strength += 1
        if (/[0-9]/.test(password)) strength += 1
        if (/[^A-Za-z0-9]/.test(password)) strength += 1
        
        if (strength <= 2) {
            strengthText = 'Weak'
            color = '#DC2626'
            strengthFill.style.backgroundColor = '#DC2626'
        } else if (strength <= 4) {
            strengthText = 'Medium'
            color = '#F59E0B'
            strengthFill.style.backgroundColor = '#F59E0B'
        } else {
            strengthText = 'Strong'
            color = '#10B981'
            strengthFill.style.backgroundColor = '#10B981'
        }
        
        const percentage = (strength / 5) * 100
        strengthFill.style.width = `${percentage}%`
        strengthLabel.innerHTML = `Password strength: ${strengthText}`
        strengthLabel.style.color = color
    }
    
    // Toggle password visibility
    window.togglePassword = function(inputId, btn) {
        const input = document.getElementById(inputId)
        const icon = btn.querySelector('i')
        
        if (input.type === 'password') {
            input.type = 'text'
            icon.classList.remove('fa-eye')
            icon.classList.add('fa-eye-slash')
        } else {
            input.type = 'password'
            icon.classList.remove('fa-eye-slash')
            icon.classList.add('fa-eye')
        }
    }
    
    // Update password
    async function updatePassword() {
        const password = newPassword.value
        const confirm = confirmPassword.value
        
        clearErrors()
        
        // Validation
        if (!password || !confirm) {
            showError(newPassword, 'Please fill in all fields')
            return
        }
        
        if (password.length < 6) {
            showError(newPassword, 'Password must be at least 6 characters')
            return
        }
        
        if (password !== confirm) {
            showError(confirmPassword, 'Passwords do not match')
            return
        }
        
        // Disable button and show loading
        updateBtn.disabled = true
        updateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...'
        
        try {
            // Get the current session
            const { data: { session }, error: sessionError } = await supabase.auth.getSession()
            
            if (sessionError || !session) {
                showToast('Session expired. Please request a new reset link.', 'error')
                updateBtn.disabled = false
                updateBtn.innerHTML = '<i class="fas fa-check-circle"></i> Update Password'
                setTimeout(() => {
                    window.location.href = '/Assets/Admin dashboard/password/password.html'
                }, 2000)
                return
            }
            
            // Update the user's password
            const { error: updateError } = await supabase.auth.updateUser({
                password: password
            })
            
            if (updateError) {
                console.error('Update error:', updateError)
                
                if (updateError.message.includes('expired')) {
                    showToast('Reset link expired. Please request a new one.', 'error')
                    setTimeout(() => {
                        window.location.href = '/Assets/Admin dashboard/password/password.html'
                    }, 2000)
                } else {
                    showToast(updateError.message || 'Failed to update password', 'error')
                }
                
                updateBtn.disabled = false
                updateBtn.innerHTML = '<i class="fas fa-check-circle"></i> Update Password'
                return
            }
            
            // Success!
            showToast('✅ Password updated successfully! Redirecting to login...', 'success')
            
            // Clear any stored sessions
            localStorage.removeItem('currentAdmin')
            localStorage.removeItem('adminSessionExpiry')
            localStorage.removeItem('rememberedAdmin')
            
            // Also update password_hash in admins table
            // Note: In a real app, you'd hash this properly, but since Supabase Auth handles it, this is optional
            
            // Redirect to login after 3 seconds
            setTimeout(() => {
                window.location.href = '/Assets/Student Authentication/Admin Authentication/Admin.html'
            }, 3000)
            
        } catch (error) {
            console.error('Unexpected error:', error)
            showToast('An unexpected error occurred. Please try again.', 'error')
            updateBtn.disabled = false
            updateBtn.innerHTML = '<i class="fas fa-check-circle"></i> Update Password'
        }
    }
    
    // Event listeners
    updateBtn.addEventListener('click', updatePassword)
    newPassword.addEventListener('input', (e) => checkPasswordStrength(e.target.value))
    
    // Enter key press
    confirmPassword.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') updatePassword()
    })
    
    console.log('Update password page loaded')
</script>
</body>
</html>
